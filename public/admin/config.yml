# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: cajytam/cajytam.fr
  branch: main

local_backend: true

media_folder: src/assets/images
public_folder: /src/assets/images

collections:
  - name: blog
    label: Articles
    label_singular: Article
    folder: src/content/blog
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{fields.slug}}"
    path: "{{fields.slug}}"
    fields:
      - label: Titre
        name: title
        widget: string
        hint: "Le slug est synchronise automatiquement a la sauvegarde."
      - label: Slug
        name: slug
        widget: string
        required: false
        hint: "Optionnel: laisse vide pour le generer depuis le titre."
      - { label: Resume, name: excerpt, widget: text }
      - label: Date de publication
        name: publishedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Categorie
        name: category
        widget: select
        options:
          - { label: Parcours, value: journey }
          - { label: Autre, value: autre }
      - label: Tags
        name: tags
        widget: list
        collapsed: false
        required: false
        field: { label: Tag, name: tag, widget: string }
      - label: Image de couverture
        name: coverImage
        widget: image
        required: false
        media_folder: "{{media_folder}}/blog"
        public_folder: "{{public_folder}}/blog"
      - label: Mis en avant
        name: featured
        widget: boolean
        default: false
        required: false
      - { label: Contenu, name: body, widget: markdown }

  - name: projects
    label: Projets
    label_singular: Projet
    folder: src/content/projects
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{fields.slug}}"
    path: "{{fields.slug}}"
    fields:
      - label: Titre
        name: title
        widget: string
        hint: "Le slug est synchronise automatiquement a la sauvegarde."
      - label: Slug
        name: slug
        widget: string
        required: false
        hint: "Optionnel: laisse vide pour le generer depuis le titre."
      - { label: Description courte, name: description, widget: text }
      - label: Technologies
        name: tags
        widget: list
        collapsed: false
        required: false
        field: { label: Tag, name: tag, widget: string }
      - label: Type de projet
        name: type
        widget: string
        required: false
      - label: Image du projet
        name: coverImage
        widget: image
        required: false
        media_folder: "{{media_folder}}/projects"
        public_folder: "{{public_folder}}/projects"
      - label: Lien du projet
        name: url
        widget: string
        required: false
      - label: Lien GitHub
        name: githubUrl
        widget: string
        required: false
      - label: Date
        name: publishedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - { label: Contenu, name: body, widget: markdown }
