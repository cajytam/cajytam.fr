<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Sveltia CMS</title>
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      const slugCollections = new Set(["blog", "projects"]);

      function slugify(input) {
        return String(input || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .trim()
          .replace(/["']/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .replace(/-{2,}/g, "-");
      }

      CMS.registerEventListener({
        name: "preSave",
        handler: ({ entry }) => {
          const collection = entry.get("collection");
          if (!slugCollections.has(collection)) {
            return entry;
          }

          const title = entry.getIn(["data", "title"]) || "";
          const currentSlug = entry.getIn(["data", "slug"]) || "";
          const nextSlug = slugify(currentSlug || title);

          if (!nextSlug) {
            return entry;
          }

          return entry
            .setIn(["data", "slug"], nextSlug)
            .set("slug", nextSlug)
            .set("path", nextSlug);
        },
      });
    </script>
  </body>
</html>
